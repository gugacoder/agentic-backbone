# ==============================================================================
# Build & Publish Docker Images
# ==============================================================================
# Push em develop  → builda imagens :staging
# Push em main     → builda imagens :latest
# Tag release-*    → builda imagens :release-N + :latest
# ==============================================================================

name: Build & Publish

on:
  push:
    branches: [develop, main]
    tags: ['release-*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/gugacoder/agentic-backbone

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: backbone
            dockerfile: apps/backbone/Dockerfile
          - name: hub
            dockerfile: apps/hub/Dockerfile
          - name: chat
            dockerfile: apps/chat/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}"

          if [[ "${{ github.ref }}" == refs/tags/release-* ]]; then
            TAG="${{ github.ref_name }}"
            echo "tags=${IMAGE}:${TAG},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "tags=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/develop ]]; then
            echo "tags=${IMAGE}:staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
