server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /hub/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /hub/ {
        try_files $uri $uri/ /hub/index.html;
    }

    location = / {
        return 301 /hub/;
    }
}
