# Platform services — internal network only (no exposed ports).
# Use docker-compose.platform.dev-ports.yml overlay for local dev access.

name: ab-platform-${ENVIRONMENT}

services:

  # ===========================================================================
  # Caddy — Reverse proxy (ponto de entrada unificado)
  # PROXY_UPSTREAM: vazio = aliases Docker (prod)
  #                 host.docker.internal = apps rodam no host (dev)
  # ===========================================================================
  caddy:
    image: caddy:alpine
    restart: unless-stopped
    environment:
      PUBLIC_PORT: ${PUBLIC_PORT}
      BACKBONE_HOST: ${PROXY_UPSTREAM:-backbone.internal}
      BACKBONE_PORT: ${BACKBONE_PORT}
      HUB_HOST: ${PROXY_UPSTREAM:-hub.internal}
      HUB_PORT: ${HUB_PROXY_PORT:-80}
      CHAT_HOST: ${PROXY_UPSTREAM:-chat.internal}
      CHAT_PORT: ${CHAT_PROXY_PORT:-80}
      ADMINER_HOST: ${PROXY_UPSTREAM:-adminer.internal}
      ADMINER_PORT: ${ADMINER_PORT}
    ports:
      - "${PUBLIC_PORT}:${PUBLIC_PORT}"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      internal:
        aliases:
          - caddy.internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:${PUBLIC_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  init:
    image: busybox:1.37
    command: ["sh", "-c", "mkdir -p /data/postgres /data/redis /data/evolution/instances /data/evolution/store && chown -R 999:999 /data/postgres && chown -R 999:999 /data/redis"]
    volumes:
      - ./data:/data
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${PROJECT}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PROJECT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - postgres.internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - redis.internal

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres.internal:5432/${PROJECT}
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis.internal:6379
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_INSTANCE_MODE: container
    volumes:
      - ./data/evolution/instances:/evolution/instances
      - ./data/evolution/store:/evolution/store
    networks:
      internal:
        aliases:
          - evolution.internal

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      internal:
        aliases:
          - adminer.internal

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    depends_on:
      init:
        condition: service_started
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-small}
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - ./data/whisper:/root/.cache/huggingface
    networks:
      internal:
        aliases:
          - whisper.internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # modelo demora para carregar
    restart: unless-stopped

networks:
  internal:
    driver: bridge
